---
# inventory/hosts.yml
#
# Inventaire minimal pour le projet ACME.
# serveur-admin est le nœud de contrôle (depuis lequel on lance les playbooks).
# Il n'est PAS dans l'inventaire car Ansible ne se déploie pas sur lui-même
# (sauf si besoin via connection: local).

all:
  children:

    # ──────────────────────────────────────────────
    # Groupe : serveurs FreeIPA
    # ──────────────────────────────────────────────
    ipa_servers:
      hosts:
        serveur-ipa:
          ansible_host: 192.168.102.10      # adapte à ton adressage réel
          ansible_user: admin_ansible       # user créé par ton collègue
          ansible_become: true
          ansible_become_method: sudo

    # ──────────────────────────────────────────────
    # Groupe : application
    # ──────────────────────────────────────────────
    app_servers:
      hosts:
        serveur-app:
          ansible_host: 192.168.102.12
          ansible_user: admin_ansible
          ansible_become: true

    # ──────────────────────────────────────────────
    # Groupe : reverse proxy
    # ──────────────────────────────────────────────
    rproxy_servers:
      hosts:
        serveur-rproxy:
          ansible_host: 192.168.103.10
          ansible_user: admin_ansible
          ansible_become: true

    # ──────────────────────────────────────────────
    # Groupe : monitoring
    # ──────────────────────────────────────────────
    monitoring_servers:
      hosts:
        serveur-monitoring:
          ansible_host: 192.168.102.13
          ansible_user: admin_ansible
          ansible_become: true

  # Variables communes à tous les hôtes
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
