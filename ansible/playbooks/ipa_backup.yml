---
# playbooks/ipa_backup.yml
#
# Playbook de SAUVEGARDE des données FreeIPA.
#
# Conforme à la demande : on sauvegarde les données (pas la VM entière).
# FreeIPA stocke ses données dans :
#   - L'annuaire LDAP (389-DS) → dump via ipa-backup
#   - Les zones DNS              → incluses dans ipa-backup
#   - Les certificats CA         → inclus dans ipa-backup
#   - La configuration Kerberos  → incluse dans ipa-backup
#
# La commande `ipa-backup` fait exactement ça : elle exporte tout ce qui est
# nécessaire pour restaurer un FreeIPA, sans avoir besoin de sauvegarder
# le système de fichiers complet.
#
# EXÉCUTION :
#   ansible-playbook -i inventory/hosts.yml playbooks/ipa_backup.yml --ask-vault-pass
#
# SAUVEGARDE AUTOMATIQUE :
#   Ce playbook est également appelé par le cron configuré sur serveur-ipa
#   (voir rôle ipa_backup_cron dans ce même répertoire).
#
# RÉSULTAT :
#   Les sauvegardes sont stockées dans /var/lib/ipa/backup/ sur serveur-ipa
#   puis copiées sur serveur-admin dans /opt/backups/ipa/.

- name: "Sauvegarder les données FreeIPA"
  hosts: ipa_servers
  become: true
  gather_facts: true

  vars:
    backup_dir_remote:  "/var/lib/ipa/backup"
    backup_dir_local:   "/opt/backups/ipa"          # sur serveur-admin
    backup_retention:   7                            # garder les 7 derniers backups

  tasks:

    - name: "Créer le répertoire de backup local sur serveur-admin"
      ansible.builtin.file:
        path: "{{ backup_dir_local }}"
        state: directory
        mode: '0750'
      delegate_to: localhost
      become: true

    - name: "Lancer ipa-backup (données LDAP + DNS + KRB + CA)"
      ansible.builtin.command:
        cmd: ipa-backup --data --online
        # --data  : sauvegarde les données uniquement (pas les binaires du système)
        # --online: effectue la sauvegarde sans arrêter les services IPA.
        #           En production on préférerait --offline pour garantir la cohérence,
        #           mais en démo --online permet de ne pas couper le service.
      register: backup_result
      changed_when: true

    - name: "Afficher le résultat de ipa-backup"
      ansible.builtin.debug:
        msg: "{{ backup_result.stdout_lines }}"

    - name: "Trouver le répertoire du dernier backup créé"
      ansible.builtin.find:
        paths: "{{ backup_dir_remote }}"
        file_type: directory
        patterns: "ipa-data-*"
      register: backup_dirs

    - name: "Compresser le dernier backup en .tar.gz"
      ansible.builtin.archive:
        path: "{{ (backup_dirs.files | sort(attribute='mtime') | last).path }}"
        dest: "{{ backup_dir_remote }}/ipa-data-{{ ansible_date_time.iso8601_basic_short }}.tar.gz"
        format: gz
      register: backup_archive

    - name: "Copier la sauvegarde vers serveur-admin"
      ansible.builtin.fetch:
        src:  "{{ backup_archive.dest }}"
        dest: "{{ backup_dir_local }}/"
        flat: true
      # flat: true → le fichier est copié directement dans backup_dir_local
      # sans créer de sous-dossier par hostname.

    - name: "Supprimer les anciennes sauvegardes (conserver les {{ backup_retention }} dernières)"
      ansible.builtin.find:
        paths: "{{ backup_dir_local }}"
        patterns: "ipa-data-*.tar.gz"
        file_type: file
      register: local_backups
      delegate_to: localhost
      become: false

    - name: "Purger les backups excédentaires sur serveur-admin"
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: >-
        {{
          (local_backups.files | sort(attribute='mtime'))[:-backup_retention]
        }}
      delegate_to: localhost
      become: false
      when: local_backups.files | length > backup_retention

    - name: "Ajouter le cron de sauvegarde automatique quotidienne"
      ansible.builtin.cron:
        name: "IPA daily backup"
        minute:  "0"
        hour:    "2"
        job:     >-
          ansible-playbook /opt/ansible/playbooks/ipa_backup.yml
          -i /opt/ansible/inventory/hosts.yml
          --vault-password-file /opt/ansible/.vault_pass
          >> /var/log/ipa-backup.log 2>&1
        user:    root
        state:   present
      delegate_to: serveur-admin
      # Le cron tourne sur serveur-admin (le nœud de contrôle Ansible),
      # pas sur serveur-ipa. C'est la philosophie retenue pour tous les crons
      # de sauvegarde : un seul endroit centralise les sauvegardes.