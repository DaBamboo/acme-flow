---
# playbooks/ipa_restore.yml
#
# Playbook de RESTAURATION des données FreeIPA.
#
# Scénario jury : "Supprimez FreeIPA et ses données, puis restaurez-les."
# Ce playbook :
#   1. Désinstalle FreeIPA (ipa-server-install --uninstall)
#   2. Réinstalle FreeIPA (appelle ipa_install.yml)
#   3. Restaure les données depuis la dernière sauvegarde
#
# EXÉCUTION :
#   ansible-playbook -i inventory/hosts.yml playbooks/ipa_restore.yml --ask-vault-pass
#
# La restauration complète prend environ 5-8 minutes.

- name: "Restaurer FreeIPA depuis la dernière sauvegarde"
  hosts: ipa_servers
  become: true
  gather_facts: true

  vars:
    backup_dir_local:   "/opt/backups/ipa"
    backup_dir_remote:  "/var/lib/ipa/backup"
    restore_tmp:        "/tmp/ipa-restore"

  tasks:

    # ── Étape 1 : Désinstaller FreeIPA ────────────────────────────────────
    - name: "1 | Vérifier que FreeIPA est installé avant de désinstaller"
      ansible.builtin.stat:
        path: /etc/ipa/default.conf
      register: ipa_installed

    - name: "1 | Désinstaller FreeIPA (supprime services + données LDAP)"
      ansible.builtin.command:
        cmd: ipa-server-install --uninstall --unattended
      when: ipa_installed.stat.exists
      # --uninstall : supprime tous les services, paquets et données FreeIPA.
      # --unattended : pas de confirmation interactive (compatible CI/CD).
      register: uninstall_result
      changed_when: true

    - name: "1 | Confirmer la désinstallation"
      ansible.builtin.debug:
        msg: "FreeIPA désinstallé. Données supprimées : annuaire LDAP, zones DNS, CA."
      when: ipa_installed.stat.exists

    # ── Étape 2 : Réinstaller FreeIPA ────────────────────────────────────
    # On appelle le playbook d'installation comme une tâche imbriquée.
    # Cela évite de dupliquer la logique d'installation.
    - name: "2 | Réinstaller FreeIPA (via ipa_install.yml)"
      ansible.builtin.import_playbook: ipa_install.yml
      # Note : import_playbook n'est pas supporté en tant que tâche dans un play.
      # Ce bloc sera converti en appel via `ansible-playbook --include` dans le script
      # de restauration. Voir scripts/restore_ipa.sh pour l'orchestration complète.

    # ── Étape 3 : Restaurer les données ──────────────────────────────────
    - name: "3 | Trouver la dernière sauvegarde sur serveur-admin"
      ansible.builtin.find:
        paths: "{{ backup_dir_local }}"
        patterns: "ipa-data-*.tar.gz"
        file_type: file
      register: available_backups
      delegate_to: localhost
      become: false
      failed_when: available_backups.files | length == 0

    - name: "3 | Identifier la sauvegarde la plus récente"
      ansible.builtin.set_fact:
        latest_backup: "{{ (available_backups.files | sort(attribute='mtime') | last).path }}"

    - name: "3 | Créer le répertoire de travail sur serveur-ipa"
      ansible.builtin.file:
        path: "{{ restore_tmp }}"
        state: directory
        mode: '0700'

    - name: "3 | Copier la sauvegarde vers serveur-ipa"
      ansible.builtin.copy:
        src:  "{{ latest_backup }}"
        dest: "{{ restore_tmp }}/backup.tar.gz"
        mode: '0600'

    - name: "3 | Décompresser l'archive"
      ansible.builtin.unarchive:
        src:  "{{ restore_tmp }}/backup.tar.gz"
        dest: "{{ backup_dir_remote }}"
        remote_src: true

    - name: "3 | Trouver le répertoire de backup décompressé"
      ansible.builtin.find:
        paths: "{{ backup_dir_remote }}"
        file_type: directory
        patterns: "ipa-data-*"
      register: restored_dirs

    - name: "3 | Restaurer les données avec ipa-restore"
      ansible.builtin.command:
        cmd: >
          ipa-restore
          --data
          --online
          --unattended
          -p {{ ipa_dm_password }}
          {{ (restored_dirs.files | sort(attribute='mtime') | last).path | basename }}
        # --data   : restaure uniquement les données (pas le système)
        # --online : pas d'arrêt des services (plus rapide pour la démo)
        # -p       : Directory Manager password (nécessaire pour écrire dans LDAP)
      no_log: true
      register: restore_result
      changed_when: true

    - name: "3 | Afficher le résultat de la restauration"
      ansible.builtin.debug:
        msg: "{{ restore_result.stdout_lines }}"

    - name: "3 | Nettoyer les fichiers temporaires"
      ansible.builtin.file:
        path: "{{ restore_tmp }}"
        state: absent

    - name: "Résumé de la restauration"
      ansible.builtin.debug:
        msg:
          - "═══════════════════════════════════════════════════"
          - "  FreeIPA restauré avec succès"
          - "  Sauvegarde utilisée : {{ latest_backup | basename }}"
          - "  Portail web : https://{{ ipa_hostname }}/ipa/ui"
          - "═══════════════════════════════════════════════════"
